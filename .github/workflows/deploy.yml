name: Deploy YoRoomie

on:
  push:
    branches:
      - master
      - feature/azure-deployment
  workflow_dispatch:    

jobs:

  backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name yoroomieacr

      - name: Build backend image
        run: |
          docker build -t yoroomieacr-ffbkg9cbc5cdb3ca.azurecr.io/yoroomie-api:${{ github.sha }} ./backend

      - name: Push backend image
        run: |
          docker push yoroomieacr-ffbkg9cbc5cdb3ca.azurecr.io/yoroomie-api:${{ github.sha }}

      - name: Deploy backend to Container App
        run: |
          az containerapp update \
            --name yoroomie-dev-api \
            --resource-group yoroomie-prod-rg \
            --image yoroomieacr-ffbkg9cbc5cdb3ca.azurecr.io/yoroomie-api:${{ github.sha }}

  frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name yoroomieacr

      - name: Build frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL=https://yoroomie-dev-api.lemonsand-de32b260.swedencentral.azurecontainerapps.io/api \
            -t yoroomieacr-ffbkg9cbc5cdb3ca.azurecr.io/yoroomie-fe:${{ github.sha }} \
            ./frontend

      - name: Push frontend image
        run: |
          docker push yoroomieacr-ffbkg9cbc5cdb3ca.azurecr.io/yoroomie-fe:${{ github.sha }}

      - name: Deploy frontend to Container App
        run: |
          az containerapp update \
            --name yoroomie-dev-fe \
            --resource-group yoroomie-prod-rg \
            --image yoroomieacr-ffbkg9cbc5cdb3ca.azurecr.io/yoroomie-fe:${{ github.sha }}