services:
  mysql:
    image: mysql:8.0
    container_name: yoroomie-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: yoroomie_db
      MYSQL_USER: yoroomie_user
      MYSQL_PASSWORD: yoroomie_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: yoroomie-backend
    restart: always
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: yoroomie_db
      DB_USER: yoroomie_user
      DB_PASSWORD: yoroomie_password
    depends_on:
      - mysql
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: yoroomie-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data: